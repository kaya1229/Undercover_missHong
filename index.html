<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>언더커버 미쓰홍 리듬게임 - 회장님의 비자금을 회수하자</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff');

        :root {
            --pixel-bg: #22252c;
            --pixel-white: #e0f8cf;
            --pixel-black: #081820;
            --retro-red: #e74c3c;
            --retro-blue: #3498db;
            --retro-gold: #f1c40f;
            --retro-purple: #9b59b6;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            box-sizing: border-box;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #1a1a1a; /* PC 배경색 */
            font-family: 'Press Start 2P', cursive, monospace;
            overflow: hidden; color: var(--pixel-white);
            display: flex;
            justify-content: center; /* PC에서 가로 중앙 정렬 */
        }

        /* 게임 전체 컨테이너 (PC에서 너비 제한, 모바일에서 100%) */
        #game-container {
            width: 100%;
            max-width: 450px; 
            height: 100%;
            background: var(--pixel-black);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            container-type: inline-size;
        }

        #game-container::after {
            content: " ";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            z-index: 200; pointer-events: none;
        }

        .overlay-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--pixel-black); z-index: 100;
        }

        #result-screen { display: none; background: rgba(8, 24, 32, 0.95); }

        .pixel-box {
            padding: 20px; border: 6px solid var(--pixel-white);
            background: var(--pixel-bg); text-align: center;
            box-shadow: 10px 10px 0px var(--pixel-black);
            margin-bottom: 20px;
        }

        .primary-btn {
            width: 240px; padding: 18px; margin: 10px;
            background: var(--pixel-white); color: var(--pixel-black);
            border: 6px solid var(--retro-blue); font-family: 'Press Start 2P';
            font-size: 12px; cursor: pointer;
            box-shadow: 6px 6px 0px var(--retro-blue);
        }

        .primary-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px var(--retro-blue); }
        
        .editor-btn { background: var(--pixel-bg); color: var(--pixel-white); border-color: var(--retro-purple); box-shadow: 6px 6px 0px var(--retro-purple); }

        #game-view { display: none; width: 100%; height: 100%; flex-direction: column; }

        #mission-screen h2, #mission-screen p {
            font-family: 'Press Start 2P', 'DungGeunMo', cursive;
        }

        #countdown-display {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20cqw; 
            width : 100%;
            font-family: 'DungGeunMo', 'Press Start 2P', cursive;
            color: var(--retro-gold);
            z-index: 150;
            text-shadow: 4px 4px #000;
            white-space: nowrap; 
            text-align: center;
            pointer-events: none;
        }

        #scoreboard {
            height: 85px; background: var(--pixel-bg);
            border-bottom: 6px solid var(--pixel-white);
            display: flex; flex-direction: column; justify-content: center; padding: 0 15px;
            gap: 10px; z-index: 10;
        }

        .stat-line { display: flex; justify-content: space-between; font-size: 10px; }
        .bar-bg { width: 120px; height: 12px; background: #444; border: 2px solid var(--pixel-white); }
        #sus-fill { width: 0%; height: 100%; background: var(--retro-red); transition: width 0.2s; }

        #canvas-wrap { flex: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        #controller {
            height: 180px; 
            background: #444;
            display: flex; 
            justify-content: stretch;
            align-items: stretch; 
            gap: 0;
            border-top: 8px solid var(--pixel-white);
        }

        .retro-btn {
            flex: 1;
            height: 100%;
            background: #cccccc;
            border: 6px solid #ffffff; 
            border-bottom: 16px solid #999999;
            border-right: 10px solid #aaaaaa;
            display: flex; 
            justify-content: center; 
            align-items: center;
            color: #444444; 
            font-size: 32px;
            text-shadow: 1px 1px #fff;
            box-sizing: border-box;
    transition: all 0.05s;
        }

        .retro-btn.active {
            transform: translateY(8px); 
    border-bottom: 6px solid #999999;
    border-right: 4px solid #aaaaaa;
    background: #bbbbbb;
        }

        #judge-tag {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 18px; z-index: 10; pointer-events: none; text-align: center;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen" class="overlay-screen">
    <h1 style="text-align:center; line-height: 1.2; margin-bottom: 40px;">
        <span style="display: block; font-size: 28px; color: var(--pixel-white); margin-bottom: 10px; text-shadow: 4px 4px var(--retro-blue);">UNDERCOVER</span>
        <span style="display: block; color: var(--retro-red); font-size: 20px;">MISS HONG</span>
        <span style="display: block; color: #fff; font-size: 10px; margin-top: 20px;">made by deokjilkkk</span>
    </h1>
    
    <button class="primary-btn" onclick="initGame(false)">INSERT COIN</button>
    <button class="primary-btn editor-btn" onclick="initGame(true)">EDITOR MODE</button>
</div>
    <div id="mission-screen" class="overlay-screen" style="display: none;">
        <div class="pixel-box" style="max-width: 80%; line-height: 1.6;">
            <h2 style="color:var(--retro-red); margin-top:0;">MISSION</h2>
            <p style="font-size: 10px;">떨어지는 비자금을 음악에 맞춰 눌러 회수하세요!</p>
            <div style="margin: 15px 0;">
                <img src="1775986746405.png" style="width: 50px; display: block; margin: 0 auto 5px;">
                <p style="font-size: 10px; color:var(--retro-red);">단, 회장님의 함정은 피해야 합니다!</p>
            </div>
            <p style="font-size: 10px;">의심도가 100%가 되면 미션 실패!<br> 그전에 비자금을 회수하면 미션 성공!</p>
        </div>
        <button class="primary-btn" onclick="startCountdown()">START</button>
    </div>

    <div id="countdown-display"></div>

    <div id="result-screen" class="overlay-screen">
        <div class="pixel-box">
            <p id="result-title" style="color:var(--retro-red); margin-bottom: 20px;">FAIL!</p>
            <p id="result-desc" style="font-size: 10px; margin-bottom: 10px;">TOTAL COLLECTED:</p>
            <p id="final-score" style="color:var(--retro-gold); font-size: 18px;">₩  0</p>
        </div>
        <button class="primary-btn" onclick="resetToHome()">GO HOME</button>
    </div>

    <div id="game-view">
        <div id="scoreboard">
            <div class="stat-line">
                <span id="label-score">CASH</span>
                <span id="score" style="color:var(--retro-gold)">₩  0</span>
            </div>
            <div class="stat-line">
                <span id="label-life">SUSPICION</span>
                <div class="bar-bg"><div id="sus-fill"></div></div>
            </div>
        </div>
        <div id="canvas-wrap">
            <div id="judge-tag"></div>
            <canvas id="gameCanvas"></canvas>
        </div>
        <div id="controller">
            <div class="retro-btn" ontouchstart="handlePress(1)">1</div>
            <div class="retro-btn" ontouchstart="handlePress(2)">2</div>
            <div class="retro-btn" ontouchstart="handlePress(3)">3</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audio = new Audio('dance_tonight.mp3'); 

    const imgRose = new Image(); imgRose.src = 'jangmi.png';
    const imgMiss = new Image(); imgMiss.src = 'geumbo.png';
    const imgRealBill = new Image(); imgRealBill.src = '1775986100725.png';
    const imgFakeBill = new Image(); imgFakeBill.src = '1775986746405.png';
    
    let isPlaying = false;
    let isEditorMode = false;
    let editedNotes = [];
    let score = 0, life = 0;
    let notes = [];
    let state = 'IDLE'; 
    let shake = 0, frame = 0;
    let comboEffect = { lane: 0, timer: 0 };
    let showGuide = true; 

    let noteSpeed = 0.4; 
    let rawData = []; 

async function initGame(editor) {
    try {
        const response = await fetch('notes.json'); 
        if (!response.ok) throw new Error("File not found");
        rawData = await response.json();
        
        isEditorMode = editor;
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        
        if(isEditorMode) {
            document.getElementById('game-view').style.display = 'flex';
            document.getElementById('label-score').innerText = "EDITOR";
            document.getElementById('score').innerText = "GUIDE ON";
            resize();
            startGame();
        } else {
            document.getElementById('mission-screen').style.display = 'flex';
        }
    } catch (error) {
        console.error("Error loading notes:", error);
        alert("notes.json 파일을 찾을 수 없습니다!");
    }
}

function startCountdown() {
    document.getElementById('mission-screen').style.display = 'none';
    document.getElementById('game-view').style.display = 'flex';
    resize();

    const countEl = document.getElementById('countdown-display');
    countEl.style.display = 'block';
    let count = 3;
    
    countEl.style.fontSize = "25cqw"; 
    countEl.innerText = count;

    const timer = setInterval(() => {
        count--;
        if (count > 0) {
            countEl.innerText = count;
        } else if (count === 0) {
            countEl.style.fontSize = "15cqw";
            countEl.innerText = "START!";
        } else {
            clearInterval(timer);
            countEl.style.display = 'none';
            startGame(); 
        }
    }, 1000);
}

    function toggleGuide() {
        if (!isEditorMode) return;
        showGuide = !showGuide;
        document.getElementById('score').innerText = showGuide ? "GUIDE ON" : "GUIDE OFF";
    }

    function resetToHome() { location.reload(); }

    function resize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }

    function startGame() {
        isPlaying = true;
        score = 0; life = 0; editedNotes = [];
        
        notes = rawData.map(n => {
            let finalType = n.type;
            if(!isEditorMode) {
                finalType = Math.random() < 0.2 ? 'FAKE' : 'REAL';
            }
            return {...n, hit: false, type: finalType, isNew: false}; 
        });
        
        audio.currentTime = 0;
        audio.play();
        requestAnimationFrame(gameLoop);
    }

    function handlePress(lane) {
        if(!isPlaying) return;

        const btn = document.querySelectorAll('.retro-btn')[lane - 1];
        if(btn) {
            btn.classList.add('active');
            if ('ontouchstart' in window) {
                setTimeout(() => btn.classList.remove('active'), 100);
            }
        }

        const now = Math.floor(audio.currentTime * 1000);

        if(isEditorMode) {
            const noteData = { time: now, lane: lane, type: "REAL", isNew: true };
            editedNotes.push(noteData);
            notes.push(noteData); 
            comboEffect = { lane: lane, timer: 12 };
            setJudge("REC", "#9b59b6");
            return;
        }

        const note = notes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - now) < 200);
        if(note) {
            note.hit = true;
            const diff = Math.abs(note.time - now);
            comboEffect = { lane: lane, timer: 15 };
            
            if(note.type === 'REAL') {
                state = 'HIT';
                if(diff < 60) { score += 15000; shake = 15; setJudge("PERFECT!", "#ffd700"); }
                else if(diff < 120) { score += 10000; shake = 8; setJudge("GREAT!", "#00f2ff"); }
                else { score += 5000; shake = 4; setJudge("GOOD", "#ffffff"); }
            } else {
                life += 15; shake = 30; state = 'PANIC'; setJudge("FAKE!!", "#ff3e3e");
            }
            updateUI();
            setTimeout(() => state = 'IDLE', 450);
        }
    }

    function setJudge(txt, col) {
        const tag = document.getElementById('judge-tag');
        tag.innerText = txt; tag.style.color = col;
        setTimeout(() => { if(tag.innerText === txt) tag.innerText = ''; }, 500);
    }

    function updateUI() {
        if(!isEditorMode) {
            document.getElementById('score').innerText = '₩ ' + score.toLocaleString();
            document.getElementById('sus-fill').style.width = life + '%';
            if(life >= 100 && isPlaying) endGame();
        }
    }

    function endGame() {
        isPlaying = false;
        audio.pause();
        
        const resTitle = document.getElementById('result-title');
        const resDesc = document.getElementById('result-desc');
        const resScore = document.getElementById('final-score');

        if(isEditorMode) {
            resTitle.innerText = "DONE!";
            resTitle.style.color = "var(--retro-purple)";
            resDesc.innerText = "CHECK CONSOLE (F12)";
            resScore.innerText = editedNotes.length + " NEW NOTES";
        } else {
            if (life < 100) {
                resTitle.innerText = "MISSION COMPLETE!";
                resTitle.style.color = "var(--retro-gold)"; 
                resDesc.innerText = "COLLECTED";
            } else {
                resTitle.innerText = "BUSTED!";
                resTitle.style.color = "var(--retro-red)"; 
                resDesc.innerText = "TOTAL COLLECTED:";
            }
            resScore.innerText = '₩ ' + score.toLocaleString();
        }
        document.getElementById('result-screen').style.display = 'flex';
    }

    function drawCharacter(ctx) {
        const cx = canvas.width / 2;
        const cy = canvas.height * 0.90; 
        const bounce = Math.sin(frame * 0.3) * 4;
        const jump = (state === 'HIT') ? -15 : 0; 
        
        let charW = 45; 
        let currentImg = (state === 'HIT') ? imgMiss : imgRose;

        ctx.save();
        ctx.translate(cx, cy + bounce + jump);

        if (currentImg.complete && currentImg.naturalWidth !== 0) {
            const aspectRatio = currentImg.naturalHeight / currentImg.naturalWidth;
            if (state === 'HIT') charW = 54; 
            const charH = charW * aspectRatio;
            if (state === 'PANIC') ctx.filter = 'contrast(2) sepia(1) hue-rotate(-50deg)';
            ctx.drawImage(currentImg, -charW / 2, -charH, charW, charH);
            ctx.filter = 'none';
        } else {
            ctx.fillStyle = (state === 'HIT') ? "pink" : "red";
            ctx.fillRect(-charW / 2, -100, charW, 120);
        }
        ctx.restore();
    }

    function drawNote(ctx, n, y) {
        if (isEditorMode && !showGuide && !n.isNew) return;
        const laneW = canvas.width / 3;
        const x = (n.lane - 1) * laneW + 15;
        const w = laneW - 30;
        const h = 55;
        const targetImg = (n.type === 'REAL') ? imgRealBill : imgFakeBill;
        
        ctx.save();
        if(isEditorMode) ctx.globalAlpha = (!n.isNew) ? 0.3 : 1.0; 
        if (targetImg.complete) ctx.drawImage(targetImg, x, y, w, h);
        ctx.restore();
    }

    function gameLoop() {
        if(!isPlaying) return;
        frame++;
        if(audio.ended) { endGame(); return; }

        let sx = (Math.random() - 0.5) * shake;
        let sy = (Math.random() - 0.5) * shake;
        if(shake > 0) shake *= 0.8;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.clearRect(-50, -50, canvas.width+100, canvas.height+100);
        
        const now = audio.currentTime * 1000;
        const judgeLineY = canvas.height * 0.8;

        ctx.strokeStyle = isEditorMode ? 'var(--retro-purple)' : '#333';
        ctx.lineWidth = isEditorMode ? 4 : 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, judgeLineY); ctx.lineTo(canvas.width, judgeLineY); ctx.stroke();
        ctx.setLineDash([]);

        if(comboEffect.timer > 0) {
            ctx.fillStyle = isEditorMode ? `rgba(155, 89, 182, ${comboEffect.timer / 20})` : `rgba(255, 255, 255, ${comboEffect.timer / 20})`;
            ctx.fillRect((comboEffect.lane-1)*(canvas.width/3), 0, canvas.width/3, canvas.height);
            comboEffect.timer--;
        }

        notes.forEach(n => {
            if(n.hit) return;
            let ny = judgeLineY - (n.time - now) * noteSpeed; 
            if(ny > -100 && ny < canvas.height) drawNote(ctx, n, ny);
            if(!isEditorMode && ny > judgeLineY + 50) { 
                n.hit = true; 
                if(n.type === 'REAL') { life += 8; updateUI(); setJudge("MISS", "#666"); }
            }
        });

        drawCharacter(ctx);
        
        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'g') toggleGuide();
        if (!isPlaying) return;
        let lane = 0;
        if (e.key === '1') lane = 1; else if (e.key === '2') lane = 2; else if (e.key === '3') lane = 3;
        if (lane > 0) {
            handlePress(lane);
            const btn = document.querySelectorAll('.retro-btn')[lane - 1];
            btn.classList.add('active');
        }
    });

    window.addEventListener('keyup', (e) => {
        let lane = 0;
        if (e.key === '1') lane = 1; else if (e.key === '2') lane = 2; else if (e.key === '3') lane = 3;
        if (lane > 0) {
            const btn = document.querySelectorAll('.retro-btn')[lane - 1];
            btn.classList.remove('active');
        }
    });

    document.getElementById('scoreboard').addEventListener('mousedown', () => toggleGuide());
    window.addEventListener('resize', resize);
</script>
</body>
</html>
