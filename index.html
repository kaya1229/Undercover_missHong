<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>언더커버 미쓰홍: 개발 툴킷</title>
    <style>
        :root { --bg: #f5f5dc; --panel: #dcdcae; --accent: #333; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 700px; height: 850px; background: #222; display: flex; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 8px solid var(--accent); border-radius: 10px; }
        #game-canvas { width: 66.6%; height: 100%; background: #1a1a1a; border-right: 4px solid var(--accent); }
        #ui-side { width: 33.3%; height: 100%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; background: var(--panel); }
        
        .mode-indicator { font-size: 24px; font-weight: 900; text-align: center; padding: 10px; margin-bottom: 20px; border: 2px solid var(--accent); }
        .MODE-EDIT { background: #ffeb3b; color: #000; }
        .MODE-PLAY { background: #4caf50; color: #fff; }

        .stat-box { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
        .btn { padding: 12px; background: var(--accent); color: white; border: none; cursor: pointer; margin-top: 8px; font-weight: bold; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-toggle { background: #5c5c5c; margin-bottom: 20px; }
        
        #judge-display { font-size: 28px; font-weight: bold; text-align: center; height: 40px; margin-top: 20px; color: #d32f2f; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas" width="450" height="850"></canvas>
    
    <div id="ui-side">
        <div id="modeTag" class="mode-indicator MODE-EDIT">EDITOR</div>
        
        <button class="btn btn-toggle" onclick="toggleMode()">모드 전환 (Tab)</button>

        <div class="stat-box">
            TIME: <span id="timeDisplay">0.00</span>s<br>
            NOTES: <span id="noteCount">0</span>
        </div>

        <div id="playStats" style="display:none;">
            <div class="stat-box">
                CASH: $<span id="score">0</span><br>
                REMAINING: <span id="life">100</span>%
            </div>
            <div id="judge-display"></div>
        </div>

        <button class="btn" onclick="controlAudio()">재생 / 일시정지 (Space)</button>
        <button class="btn" onclick="exportData()">JSON 데이터 복사</button>
        <button class="btn" onclick="clearNotes()" style="background:#d32f2f;">노트 초기화</button>
        
        <p style="font-size: 11px; margin-top: auto; color: #555;">
            [1, 2, 3] 키: 노트 입력<br>
            [Tab]: 에디터 <-> 플레이 전환<br>
            [Space]: 음악 재생/정지
        </p>
    </div>
</div>

type":"REAL"},{"time":200092,"lane":3,"type":"REAL"},{"time":200295,"lane":1,"type":"REAL"},{"time":200538,"lane":2,"type":"REAL"},{"time":200859,"lane":3,"type":"REAL"},{"time":201047,"lane":2,"type":"REAL"},{"time":201317,"lane":1,"type":"REAL"},{"time":201558,"lane":2,"type":"REAL"},{"time":201840,"lane":3,"type":"REAL"},{"time":202056,"lane":2,"type":"REAL"}]]; 
    notes = initialData;

    function toggleMode() {
        currentMode = currentMode === 'EDIT' ? 'PLAY' : 'EDIT';
        const tag = document.getElementById('modeTag');
        const playStats = document.getElementById('playStats');
        
        tag.innerText = currentMode;
        tag.className = `mode-indicator MODE-${currentMode}`;
        playStats.style.display = currentMode === 'PLAY' ? 'block' : 'none';
        
        // 플레이 모드 진입 시 노트 상태 초기화
        notes.forEach(n => n.hit = false);
        score = 0; life = 100;
        updateUI();
    }

    function controlAudio() {
        if (audio.paused) audio.play();
        else audio.pause();
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); controlAudio(); }
        if (e.code === 'Tab') { e.preventDefault(); toggleMode(); }

        let lane = 0;
        if (e.key === '1') lane = 1;
        if (e.key === '2') lane = 2;
        if (e.key === '3') lane = 3;

        if (lane > 0 && !audio.paused) {
            const currentTime = audio.currentTime * 1000;
            if (currentMode === 'EDIT') {
                // 에디터 모드: 노트 기록
                notes.push({ time: Math.floor(currentTime), lane: lane, type: 'REAL' });
                notes.sort((a, b) => a.time - b.time);
            } else {
                // 플레이 모드: 판정
                checkHit(currentTime, lane);
            }
        }
    });

    function checkHit(currentTime, lane) {
        const hitNote = notes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - currentTime) < 150);
        if (hitNote) {
            hitNote.hit = true;
            score += 100;
            showJudge("PERFECT");
            updateUI();
        }
    }

    function showJudge(txt) {
        const display = document.getElementById('judge-display');
        display.innerText = txt;
        setTimeout(() => display.innerText = "", 400);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('life').innerText = life;
        document.getElementById('noteCount').innerText = notes.length;
    }

    function exportData() {
        const dataStr = JSON.stringify(notes);
        navigator.clipboard.writeText(dataStr);
        alert("콘솔에 데이터를 출력하고 클립보드에 복사했습니다!");
        console.log(dataStr);
    }

    function clearNotes() {
        if(confirm("모든 노트를 지울까요?")) notes = [];
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const currentTime = audio.currentTime * 1000;
        document.getElementById('timeDisplay').innerText = audio.currentTime.toFixed(2);

        // 가이드 라인
        ctx.strokeStyle = "#333";
        for(let i=1; i<3; i++) {
            ctx.beginPath(); ctx.moveTo(i*150, 0); ctx.lineTo(i*150, 850); ctx.stroke();
        }

        // 판정선
        ctx.fillStyle = currentMode === 'EDIT' ? "#ffeb3b" : "#4caf50";
        ctx.fillRect(0, 750, 450, 8);

        // 노트 렌더링
        notes.forEach(note => {
            if (note.hit) return;
            const dropSpeed = 0.6; 
            const y = 750 - (note.time - currentTime) * dropSpeed;

            if (y > -50 && y < 850) {
                ctx.fillStyle = note.type === 'REAL' ? "#FFD700" : "#FF4500";
                ctx.shadowBlur = 10; ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.beginPath();
                ctx.roundRect((note.lane - 1) * 150 + 20, y, 110, 35, 8);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 플레이 모드에서 놓친 노트
            if (currentMode === 'PLAY' && y > 780 && !note.hit) {
                note.hit = true;
                life -= 5;
                updateUI();
            }
        });

        requestAnimationFrame(draw);
    }

    draw();
</script>
