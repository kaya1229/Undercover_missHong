<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>언더커버 미쓰홍 1980 - 픽셀 에디션</title>
    <style>
        /* [폰트/컬러 설정] */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --pixel-bg: #22252c;
            --pixel-white: #e0f8cf; /* 게임보이 스타일 연두/흰색 */
            --pixel-black: #081820;
            --retro-red: #e74c3c;
            --retro-blue: #3498db;
            --retro-gold: #f1c40f;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--pixel-black);
            font-family: 'Press Start 2P', cursive, monospace; /* 레트로 폰트 */
            overflow: hidden; touch-action: none; color: var(--pixel-white);
        }

        /* [스캔라인 효과] */
        body::after {
            content: " ";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 200; pointer-events: none;
        }

        /* [인트로] */
        #intro-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--pixel-black); z-index: 100;
        }

        #intro-screen h1 {
            font-size: 18px; line-height: 1.8; text-align: center;
            color: var(--retro-red); text-shadow: 4px 4px 0px #fff;
            margin-bottom: 60px;
        }

        .start-btn {
            padding: 20px 40px; background: var(--pixel-white); color: var(--pixel-black);
            border: 6px solid var(--retro-blue); font-family: 'Press Start 2P';
            font-size: 14px; cursor: pointer;
            box-shadow: 8px 8px 0px var(--retro-blue);
        }

        /* [게임 뷰 구성] */
        #game-view { display: none; width: 100%; height: 100%; flex-direction: column; }

        #scoreboard {
            height: 85px; background: var(--pixel-bg);
            border-bottom: 6px solid var(--pixel-white);
            display: flex; flex-direction: column; justify-content: center; padding: 0 15px;
            gap: 10px;
        }

        .stat-line { display: flex; justify-content: space-between; font-size: 10px; }
        .bar-bg { width: 100px; height: 12px; background: #444; border: 2px solid var(--pixel-white); }
        #sus-fill { width: 0%; height: 100%; background: var(--retro-red); transition: width 0.3s; }

        #canvas-wrap { flex: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* [하단 컨트롤러] */
        #controller {
            height: 170px; background: #555;
            display: flex; justify-content: center; align-items: center; gap: 20px;
            border-top: 8px solid var(--pixel-white);
            position: relative;
        }

        .retro-btn {
            width: 70px; height: 70px; background: #999;
            border: 4px solid #fff; border-bottom-width: 8px; border-right-width: 8px;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 20px; text-shadow: 2px 2px #000;
        }

        .retro-btn:active {
            transform: translate(2px, 2px);
            border-bottom-width: 4px; border-right-width: 4px;
            background: var(--retro-red);
        }

        #judge-tag {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; z-index: 10; pointer-events: none; text-align: center;
        }
    </style>
</head>
<body>

<div id="intro-screen">
    <h1>UNDERCOVER<br>MISS HONG<br><span style="color:#fff">1980</span></h1>
    <button class="start-btn" onclick="initGame()">PRESS START</button>
</div>

<div id="game-view">
    <div id="scoreboard">
        <div class="stat-line">
            <span>CASH</span>
            <span id="score" style="color:var(--retro-gold)">₩ 0</span>
        </div>
        <div class="stat-line">
            <span>SUSPICION</span>
            <div class="bar-bg"><div id="sus-fill"></div></div>
        </div>
    </div>
    <div id="canvas-wrap">
        <div id="judge-tag"></div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="controller">
        <div class="retro-btn" ontouchstart="handlePress(1)">1</div>
        <div class="retro-btn" ontouchstart="handlePress(2)">2</div>
        <div class="retro-btn" ontouchstart="handlePress(3)">3</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const audio = new Audio('dance_tonight.mp3'); 

    // 이미지 경로 (전달해주신 파일명)
    const imgRose = new Image(); imgRose.src = '1775988220732(2).png';
    const imgMiss = new Image(); imgMiss.src = '1775988220732(3).png';
    const imgRealBill = new Image(); imgRealBill.src = '1775986100725.png';
    const imgFakeBill = new Image(); imgFakeBill.src = '1775986746405.png';
    
    let isPlaying = false;
    let score = 0, life = 0;
    let notes = [];
    let state = 'IDLE'; 
    let shake = 0;
    let comboEffect = { lane: 0, timer: 0 };
    let frame = 0;

    const rawData = [{"time":6900,"lane":1,"type":"REAL"},{"time":8612,"lane":2,"type":"REAL"},{"time":10532,"lane":1,"type":"REAL"},{"time":11448,"lane":2,"type":"REAL"},{"time":12502,"lane":1,"type":"REAL"},{"time":13782,"lane":2,"type":"REAL"},{"time":14547,"lane":3,"type":"REAL"},{"time":15541,"lane":1,"type":"REAL"},{"time":16318,"lane":3,"type":"REAL"},{"time":17785,"lane":1,"type":"REAL"},{"time":18368,"lane":3,"type":"REAL"},{"time":19102,"lane":2,"type":"REAL"},{"time":20005,"lane":2,"type":"REAL"},{"time":20956,"lane":2,"type":"REAL"},{"time":21869,"lane":1,"type":"REAL"},{"time":22606,"lane":3,"type":"REAL"},{"time":23948,"lane":1,"type":"REAL"},{"time":24970,"lane":2,"type":"REAL"},{"time":26147,"lane":3,"type":"REAL"},{"time":27642,"lane":1,"type":"REAL"},{"time":28654,"lane":2,"type":"REAL"},{"time":29513,"lane":3,"type":"REAL"},{"time":30880,"lane":2,"type":"REAL"},{"time":32195,"lane":3,"type":"REAL"},{"time":33701,"lane":1,"type":"REAL"},{"time":34772,"lane":3,"type":"REAL"},{"time":35731,"lane":2,"type":"REAL"},{"time":36732,"lane":1,"type":"REAL"},{"time":38231,"lane":3,"type":"REAL"},{"time":39789,"lane":3,"type":"REAL"},{"time":40735,"lane":2,"type":"REAL"},{"time":42165,"lane":1,"type":"REAL"},{"time":43166,"lane":2,"type":"REAL"},{"time":44617,"lane":1,"type":"REAL"},{"time":45780,"lane":3,"type":"REAL"},{"time":46812,"lane":1,"type":"REAL"},{"time":47802,"lane":2,"type":"REAL"},{"time":48830,"lane":3,"type":"REAL"}];

    function initGame() {
        document.getElementById('intro-screen').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        resize();
        startGame();
    }

    function resize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
    }

    function startGame() {
        isPlaying = true; score = 0; life = 0;
        notes = rawData.map(n => ({...n, hit: false, type: Math.random() < 0.2 ? 'FAKE' : 'REAL'}));
        audio.play();
        requestAnimationFrame(gameLoop);
    }

    function handlePress(lane) {
        if(!isPlaying) return;
        const now = audio.currentTime * 1000;
        const note = notes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - now) < 200);
        
        if(note) {
            note.hit = true;
            comboEffect = { lane: lane, timer: 15 };
            if(note.type === 'REAL') {
                score += 10000; shake = 12; state = 'HIT';
                setJudge("COOL!!", "#00f2ff");
            } else {
                life += 25; shake = 25; state = 'PANIC';
                setJudge("BAD!", "#ff3e3e");
            }
            updateUI();
            setTimeout(() => state = 'IDLE', 400);
        }
    }

    function setJudge(txt, col) {
        const tag = document.getElementById('judge-tag');
        tag.innerText = txt; tag.style.color = col;
        setTimeout(() => { if(tag.innerText === txt) tag.innerText = ''; }, 400);
    }

    function updateUI() {
        document.getElementById('score').innerText = '₩' + score.toLocaleString();
        document.getElementById('sus-fill').style.width = life + '%';
        if(life >= 100) { isPlaying = false; audio.pause(); alert("GAMEOVER - BUSTED!"); location.reload(); }
    }

    function drawCharacter(ctx) {
        const cx = canvas.width / 2;
        const cy = canvas.height * 0.85;
        const bounce = Math.sin(frame * 0.3) * 8;
        const jump = (state === 'HIT') ? -40 : 0;

        const charW = 100; const charH = 120;
        ctx.save();
        ctx.translate(cx, cy + bounce + jump);

        if (state === 'HIT') {
            if (imgMiss.complete) ctx.drawImage(imgMiss, -charW/2, -charH + 20, charW, charH);
        } else {
            if (state === 'PANIC') ctx.filter = 'invert(0.5) sepia(1) saturate(5) hue-rotate(-50deg)';
            if (imgRose.complete) ctx.drawImage(imgRose, -charW/2, -charH + 20, charW, charH);
            ctx.filter = 'none';
        }
        ctx.restore();
    }

    function drawNote(ctx, n, y) {
        const laneW = canvas.width / 3;
        const x = (n.lane - 1) * laneW + 15;
        const w = laneW - 30;
        const h = 55;

        const targetImg = (n.type === 'REAL') ? imgRealBill : imgFakeBill;
        if (targetImg.complete) {
            ctx.drawImage(targetImg, x, y, w, h);
        }
    }

    function gameLoop() {
        if(!isPlaying) return;
        frame++;
        
        let sx = (Math.random() - 0.5) * shake;
        let sy = (Math.random() - 0.5) * shake;
        if(shake > 0) shake *= 0.8;

        ctx.save();
        ctx.translate(sx, sy);
        ctx.clearRect(-50, -50, canvas.width+100, canvas.height+100);
        
        const now = audio.currentTime * 1000;
        const judgeLineY = canvas.height * 0.82;

        // 레인 구분선 (도트 느낌)
        ctx.strokeStyle = '#222'; ctx.setLineDash([5, 5]);
        for(let i=1; i<3; i++) {
            ctx.beginPath(); ctx.moveTo(i*canvas.width/3, 0); ctx.lineTo(i*canvas.width/3, canvas.height); ctx.stroke();
        }
        ctx.setLineDash([]);

        // 판정 이펙트
        if(comboEffect.timer > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${comboEffect.timer / 20})`;
            ctx.fillRect((comboEffect.lane-1)*(canvas.width/3), 0, canvas.width/3, canvas.height);
            comboEffect.timer--;
        }

        notes.forEach(n => {
            if(n.hit) return;
            let ny = judgeLineY - (n.time - now) * 0.7; // 속도 약간 상향
            if(ny > -100 && ny < canvas.height) drawNote(ctx, n, ny);
            if(ny > judgeLineY + 60) { n.hit = true; if(n.type === 'REAL') { life += 5; updateUI(); } }
        });

        drawCharacter(ctx);
        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', resize);
</script>
</body>
</html>
