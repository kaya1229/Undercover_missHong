    });

    let score = 0;
    let life = 100;
    let combo = 0;
    const judgeText = document.getElementById('judge-text');

    function startGame() {
        score = 0; life = 100; combo = 0;
        document.getElementById('score').innerText = score;
        document.getElementById('life').innerText = life;
        audio.currentTime = 0;
        audio.play();
        update();
    }

    // 키 입력 판정
    window.addEventListener('keydown', (e) => {
        if (audio.paused) return;
        
        const currentTime = audio.currentTime * 1000;
        let pressedLane = 0;
        if (e.key === '1') pressedLane = 1;
        if (e.key === '2') pressedLane = 2;
        if (e.key === '3') pressedLane = 3;

        if (pressedLane > 0) {
            // 가장 가까운 노트 찾기
            const hitNote = notes.find(n => 
                !n.hit && 
                n.lane === pressedLane && 
                Math.abs(n.time - currentTime) < 150
            );

            if (hitNote) {
                hitNote.hit = true;
                if (hitNote.type === 'REAL') {
                    showJudge("PERFECT!", "#gold");
                    score += 100;
                    combo++;
                } else {
                    showJudge("FAKE!!", "red");
                    life -= 10;
                    combo = 0;
                }
                updateUI();
            }
        }
    });

    function showJudge(text, color) {
        judgeText.innerText = text;
        judgeText.style.color = color;
        setTimeout(() => judgeText.innerText = "", 500);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('life').innerText = life;
        if (life <= 0) {
            audio.pause();
            alert("정체가 들통났습니다! (GAME OVER)");
        }
    }

    function update() {
        if (audio.paused) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const currentTime = audio.currentTime * 1000;

        // 판정선
        ctx.fillStyle = "#555";
        ctx.fillRect(0, 700, 400, 5);

        // 노트 그리기
        notes.forEach(note => {
            if (note.hit) return;
            const dropSpeed = 0.6; 
            const y = 700 - (note.time - currentTime) * dropSpeed;
            
            if (y > -50 && y < 800) {
                // 디자인: 비자금(REAL)은 금색, 가짜(FAKE)는 붉은색
                ctx.fillStyle = note.type === 'REAL' ? '#FFD700' : '#FF4500';
                ctx.beginPath();
                ctx.roundRect((note.lane - 1) * 133 + 30, y, 70, 30, 5);
                ctx.fill();
                
                // 장부 아이콘 느낌의 선 추가
                ctx.strokeStyle = "rgba(0,0,0,0.3)";
                ctx.strokeRect((note.lane - 1) * 133 + 35, y + 5, 60, 2);
            }

            // 놓친 노트 처리
            if (y > 750 && !note.hit) {
                note.hit = true;
                if (note.type === 'REAL') {
                    life -= 5;
                    showJudge("MISS", "gray");
                    updateUI();
                }
            }
        });

        requestAnimationFrame(update);
    }
</script>
</body>
</html>
