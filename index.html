<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>언더커버 미쓰홍: 비자금 디펜스</title>
    <style>
        :root { --bg: #f5f5dc; --panel: #dcdcae; --accent: #333; --gold: #FFD700; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 900px; background: #222; display: flex; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 8px solid var(--accent); border-radius: 10px; }
        #game-canvas { width: 62.5%; height: 100%; background: #1a1a1a; border-right: 4px solid var(--accent); }
        #ui-side { width: 37.5%; height: 100%; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; background: var(--panel); }
        
        .mode-indicator { font-size: 24px; font-weight: 900; text-align: center; padding: 12px; margin-bottom: 20px; border: 2px solid var(--accent); border-radius: 5px; }
        .MODE-EDIT { background: #ffeb3b; color: #000; }
        .MODE-PLAY { background: #4caf50; color: #fff; }

        .stat-box { background: rgba(255,255,255,0.6); padding: 15px; border-radius: 8px; margin-bottom: 15px; font-family: monospace; border: 1px solid rgba(0,0,0,0.1); }
        .btn { padding: 15px; background: var(--accent); color: white; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.2s; border-radius: 5px; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-toggle { background: #5c5c5c; margin-bottom: 25px; }
        
        #judge-display { font-size: 36px; font-weight: bold; text-align: center; height: 50px; margin-top: 20px; color: #d32f2f; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas" width="500" height="900"></canvas>
    
    <div id="ui-side">
        <div id="modeTag" class="mode-indicator MODE-EDIT">EDITOR</div>
        
        <button class="btn btn-toggle" onclick="toggleMode()">모드 전환 (Tab)</button>

        <div class="stat-box">
            TIME: <span id="timeDisplay">0.00</span>s<br>
            NOTES: <span id="noteCount">0</span>
        </div>

        <div id="playStats" style="display:none;">
            <div class="stat-box" style="color: green; font-weight: bold;">
                CASH: $<span id="score">0</span>
            </div>
            <div class="stat-box" style="color: red;">
                SUSPICION: <span id="life">0</span>%
            </div>
            <div id="judge-display"></div>
        </div>

        <button class="btn" onclick="controlAudio()">재생 / 일시정지 (Space)</button>
        <button class="btn" onclick="exportData()">JSON 데이터 복사</button>
        <button class="btn" onclick="clearNotes()" style="background:#d32f2f;">노트 초기화</button>
        
        <p style="font-size: 11px; margin-top: auto; color: #555; line-height: 1.4;">
            [1, 2, 3, 4, 5] 키: 노트 입력<br>
            [Tab]: 에디터 <-> 플레이 전환<br>
            [Space]: 음악 재생/정지
        </p>
    </div>
</div>

2,"type":"REAL"},{"time":200092,"lane":3,"type":"REAL"},{"time":200295,"lane":1,"type":"REAL"},{"time":200538,"lane":2,"type":"REAL"},{"time":200859,"lane":3,"type":"REAL"},{"time":201047,"lane":2,"type":"REAL"},{"time":201317,"lane":1,"type":"REAL"},{"time":201558,"lane":2,"type":"REAL"},{"time":201840,"lane":3,"type":"REAL"},{"time":202056,"lane":2,"type":"REAL"}]];

    // 5레인 대응을 위해 기존 데이터를 랜덤하게 레인 배정
    notes = initialRawData[0].map(n => {
        // 기존 1,2,3 레인을 유지하되 일부를 4,5 레인으로 랜덤 이동
        const newLane = Math.random() > 0.4 ? n.lane : Math.floor(Math.random() * 5) + 1;
        
        // 데이터 중 일부를 억지로 FAKE나 BOSS로 변경 (에디터 테스트용)
        let type = 'REAL';
        if (Math.random() < 0.05) type = 'FAKE'; // 5% 확률로 가짜
        if (n.time > 40000 && n.time < 42000 && Math.random() < 0.2) type = 'BOSS'; // 특정 구간 BOSS

        return { ...n, lane: newLane, type: type, hit: false };
    });
    notes.sort((a, b) => a.time - b.time); // 시간순 정렬

    function toggleMode() {
        currentMode = currentMode === 'EDIT' ? 'PLAY' : 'EDIT';
        const tag = document.getElementById('modeTag');
        const playStats = document.getElementById('playStats');
        
        tag.innerText = currentMode;
        tag.className = `mode-indicator MODE-${currentMode}`;
        playStats.style.display = currentMode === 'PLAY' ? 'block' : 'none';
        
        notes.forEach(n => n.hit = false);
        score = 0; life = 0; // 플레이 모드 진입 시 의심도 0
        characterState = 'IDLE';
        updateUI();
    }

    function controlAudio() {
        if (audio.paused) audio.play();
        else audio.pause();
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); controlAudio(); }
        if (e.code === 'Tab') { e.preventDefault(); toggleMode(); }

        let lane = 0;
        // 1,2,3,4,5 키 대응
        if (e.key === '1') lane = 1;
        if (e.key === '2') lane = 2;
        if (e.key === '3') lane = 3;
        if (e.key === '4') lane = 4;
        if (e.key === '5') lane = 5;

        if (lane > 0 && !audio.paused) {
            const currentTime = audio.currentTime * 1000;
            if (currentMode === 'EDIT') {
                notes.push({ time: Math.floor(currentTime), lane: lane, type: 'REAL', hit: false });
                notes.sort((a, b) => a.time - b.time);
            } else {
                checkHit(currentTime, lane);
            }
        }
    });

    function checkHit(currentTime, lane) {
        // 가장 가깝고 판정 범위 내에 있는 노트 찾기
        const hitNote = notes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - currentTime) < 160);
        
        if (hitNote) {
            hitNote.hit = true;
            if (hitNote.type === 'REAL') {
                score += 100;
                showJudge("回數成功!", "green"); // 회수 성공 (일본어풍 한자 연출)
                characterState = 'HIT';
            } else if (hitNote.type === 'FAKE') {
                life += 15; // 의심도 상승
                showJudge("FAKE!!", "red");
                characterState = 'MISS';
            } else if (hitNote.type === 'BOSS') {
                // BOSS 노트를 누르면 순간적으로 의심도가 크게 올라감
                life += 25;
                showJudge("꼰대기습!", "#8b0000"); // 꼰대 기습
                characterState = 'MISS';
            }
            updateUI();
            // 0.3초 후Idle 상태로 복귀
            setTimeout(() => characterState = 'IDLE', 300);
        }
    }

    function showJudge(txt, color) {
        const display = document.getElementById('judge-display');
        display.innerText = txt;
        display.style.color = color;
        // 이전 타이머 클리어
        if(window.judgeTimer) clearTimeout(window.judgeTimer);
        window.judgeTimer = setTimeout(() => display.innerText = "", 500);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('life').innerText = life;
        document.getElementById('noteCount').innerText = notes.length;
        
        if (life >= 100) {
            audio.pause();
            alert(`정체가 들통났습니다! (최종회수액: $${score})`);
            toggleMode(); // 에디터로 강제 복귀
        }
    }

    function exportData() {
        const dataToExport = notes.map(n => ({ time: n.time, lane: n.lane, type: n.type }));
        const dataStr = JSON.stringify(dataToExport);
        navigator.clipboard.writeText(dataStr);
        alert("데이터를 클립보드에 복사했습니다! (F12 콘솔에도 출력됨)");
        console.log(dataStr);
    }

    function clearNotes() {
        if(confirm("모든 노트를 지울까요?")) notes = [];
    }

    // --- 렌더링 엔진 ---

    function drawNote(note, y) {
        const x = (note.lane - 1) * LANE_WIDTH + 15;
        const w = LANE_WIDTH - 30;
        const h = 35;

        // 그림자 효과로 입체감
        ctx.shadowBlur = 8;
        ctx.shadowColor = "rgba(0,0,0,0.4)";

        if (note.type === 'REAL') {
            // 진짜 노트: 현금다발 모양 (녹색 테두리 + 노란색)
            ctx.fillStyle = "#FFD700"; // 골드
            ctx.strokeStyle = "#006400"; // 다크 그린
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8); // 지폐 뭉치 본체
            ctx.fill();
            ctx.stroke();
            
            // 지폐 로고 ($)
            ctx.fillStyle = "#006400";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("$", x + w/2, y + h/1.5);
            
            // 동전 느낌의 반짝임 포인트
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(x+10, y+10, 3, 0, Math.PI*2); ctx.fill();

        } else if (note.type === 'FAKE') {
            // FAKE 노트: 영수증/종이 모양 (회색)
            ctx.fillStyle = "#A9A9A9";
            ctx.beginPath();
            ctx.rect(x + 10, y + 5, w - 20, h - 10);
            ctx.fill();
            
            // X 표시
            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x+20, y+10); ctx.lineTo(x+w-20, y+h-10);
            ctx.moveTo(x+w-20, y+10); ctx.lineTo(x+20, y+h-10);
            ctx.stroke();

        } else if (note.type === 'BOSS') {
            // BOSS 노트: 상사의 서류첩 (검은색)
            ctx.fillStyle = "#1a1a1a";
            ctx.strokeStyle = "red";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y-5, w, h+10, 3);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = "red";
            ctx.font = "12px sans-serif";
            ctx.fillText("꼰대", x + w/2, y + h/1.2);
        }
        
        ctx.shadowBlur = 0; // 그림자 초기화
    }

    function drawCharacter() {
        const charX = canvas.width / 2;
        const charY = 820; // 판정선 아래
        
        ctx.save();
        ctx.translate(charX, charY);
        
        if (characterState === 'IDLE') {
            // 대기: 낮의 홍장미 (촌스러운 도트)
            ctx.fillStyle = "#8b4513"; // 갈색 머리
            ctx.beginPath(); ctx.arc(0, -20, 15, 0, Math.PI*2); ctx.fill(); // 머리
            ctx.fillStyle = "#fff"; // 셔츠
            ctx.fillRect(-10, -5, 20, 30);
            // 안경 표현
            ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
            ctx.strokeRect(-8, -20, 6, 6); ctx.strokeRect(2, -20, 6, 6);

        } else if (characterState === 'HIT') {
            // 성공: 밤의 미쓰홍 (세련된 요원)
            // 순간적인 요원 실루엣 연출 (검은색 suit + 역동적 포즈)
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.moveTo(0, -30); ctx.lineTo(15, 10); ctx.lineTo(-15, 10); ctx.close(); ctx.fill();
            // 반짝이는 이펙트
            ctx.fillStyle = "gold";
            for(let i=0; i<8; i++) {
                ctx.beginPath(); ctx.arc(Math.random()*40-20, Math.random()*40-30, 2, 0, Math.PI*2); ctx.fill();
            }

        } else if (characterState === 'MISS') {
            // 실수: 좌절 (서류에 파묻힘)
            ctx.fillStyle = "gray";
            ctx.fillRect(-20, -10, 40, 40); // 서류 더미
            ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.fillText("OTL", 0, 15);
        }
        
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const currentTime = audio.currentTime * 1000;
        document.getElementById('timeDisplay').innerText = audio.currentTime.toFixed(2);

        // 가이드 라인 그리기 (5레인)
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 1;
        for(let i=1; i<LANE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i*LANE_WIDTH, 0); ctx.lineTo(i*LANE_WIDTH, 900); ctx.stroke();
        }

        // 판정선
        ctx.fillStyle = currentMode === 'EDIT' ? "#ffeb3b" : "#4caf50";
        ctx.fillRect(0, 750, 500, 10);

        // 노트 렌더링
        notes.forEach(note => {
            if (note.hit) return;
            const dropSpeed = 0.65; 
            const y = 750 - (note.time - currentTime) * dropSpeed;

            if (y > -100 && y < 900) {
                drawNote(note, y);
            }

            // 플레이 모드에서 놓친 노트 (Miss)
            if (currentMode === 'PLAY' && y > 790 && !note.hit) {
                note.hit = true;
                if(note.type === 'REAL') {
                    life += 5; // 비자금을 놓치면 의심도가 소폭 상승
                    showJudge("MISS", "gray");
                    characterState = 'MISS';
                    setTimeout(() => characterState = 'IDLE', 300);
                }
                updateUI();
            }
        });
        
        // 주인공 캐릭터 그리기
        if (currentMode === 'PLAY') {
            drawCharacter();
        }

        requestAnimationFrame(draw);
    }

    draw();
</script>
