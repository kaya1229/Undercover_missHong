<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>언더커버 미쓰홍: 1990 Retro</title>
    <style>
        :root { --bg: #c0c0c0; --panel: #d3d3d3; --accent: #000080; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; overflow: hidden; }
        
        #game-container { position: relative; width: 850px; height: 920px; background: #000; display: flex; border: 10px double #808080; }
        #game-canvas { width: 66.6%; height: 100%; background: #111; image-rendering: pixelated; border-right: 6px ridge #808080; }
        
        #ui-side { width: 33.4%; height: 100%; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; background: var(--panel); }
        .stat-box { background: #000; color: #00ff00; padding: 15px; border: 3px inset #fff; margin-bottom: 15px; font-size: 18px; }
        .btn { padding: 12px; background: #c0c0c0; border: 3px outset #fff; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #judge-display { font-size: 32px; font-weight: bold; text-align: center; color: #ff0000; height: 50px; }
        .key-guide { font-size: 12px; color: #555; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas" width="560" height="920"></canvas>
    <div id="ui-side">
        <div style="font-weight:bold; margin-bottom:10px;">MISSION: UNDERCOVER</div>
        <div class="stat-box">
            TIME: <span id="timeDisplay">0.00</span>s<br>
            CASH: $<span id="score">0</span><br>
            SUSP: <span id="life">0</span>%
        </div>
        <div id="judge-display"></div>
        <button class="btn" onclick="controlAudio()">START/STOP [SPACE]</button>
        <div class="key-guide">LANE 1: [S] | LANE 2: [D] | LANE 3: [F]</div>
        <div style="margin-top:auto; font-size:10px;">(C) 1996 UNDERCOVER PROJECT</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const audio = new Audio('dance_tonight.mp3');
    
    // --- 이미지 로드 (회장님 지폐) ---
    const fakeImg = new Image();
    fakeImg.src = 'image_30bba7.png'; // 업로드하신 이미지 파일명으로 설정

    let score = 0; let life = 0;
    const LANE_COUNT = 3;
    const LANE_WIDTH = canvas.width / LANE_COUNT;
    const JUDGE_LINE_Y = 780;

    // 키 눌림 상태 시각화용
    let keyEffect = [false, false, false];

    // 노트 데이터
    let rawNotes = [{"time":601,"lane":1},{"time":892,"lane":1},{"time":2456,"lane":1},{"time":2775,"lane":1},{"time":3446,"lane":2},{"time":3705,"lane":3},{"time":3892,"lane":1},{"time":4481,"lane":2},{"time":4814,"lane":2},{"time":6508,"lane":3},{"time":6814,"lane":3},{"time":8477,"lane":1},{"time":8855,"lane":1},{"time":9329,"lane":2},{"time":9648,"lane":2},{"time":10502,"lane":3},{"time":10867,"lane":3},{"time":12518,"lane":1},{"time":12930,"lane":2},{"time":14529,"lane":1},{"time":14869,"lane":2},{"time":15291,"lane":1},{"time":15891,"lane":1},{"time":16279,"lane":1},{"time":17559,"lane":1},{"time":17714,"lane":2},{"time":18004,"lane":3},{"time":19586,"lane":1},{"time":19969,"lane":1},{"time":20304,"lane":2},{"time":21594,"lane":3},{"time":21806,"lane":2},{"time":22087,"lane":1},{"time":23886,"lane":1},{"time":24109,"lane":2},{"time":24372,"lane":3}];
    
    let notes = rawNotes.map(n => ({
        ...n,
        type: Math.random() < 0.2 ? 'FAKE' : 'REAL',
        hit: false
    }));

    function drawNote(note, y) {
        const x = (note.lane - 1) * LANE_WIDTH + (LANE_WIDTH / 2);
        const w = 120; const h = 60;

        if (note.type === 'FAKE' && fakeImg.complete) {
            // 회장님 지폐 이미지 그리기
            ctx.drawImage(fakeImg, x - w/2, y - h/2, w, h);
            // 레트로한 테두리 추가
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
            ctx.strokeRect(x - w/2, y - h/2, w, h);
        } else {
            // 일반 지폐 (초록색 도트)
            ctx.fillStyle = "#2e7d32";
            ctx.fillRect(x - w/2, y - h/2, w, h);
            ctx.strokeStyle = "#fff"; ctx.strokeRect(x - w/2, y - h/2, w, h);
            ctx.fillStyle = "#fff"; ctx.font = "20px monospace";
            ctx.textAlign = "center"; ctx.fillText("₩", x, y + 7);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const currentTime = audio.currentTime * 1000;
        document.getElementById('timeDisplay').innerText = audio.currentTime.toFixed(2);

        // 레인 & 키 효과
        for(let i=0; i<LANE_COUNT; i++) {
            ctx.fillStyle = keyEffect[i] ? "#333" : "#111";
            ctx.fillRect(i*LANE_WIDTH, 0, LANE_WIDTH, canvas.height);
        }

        // 판정선
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(0, JUDGE_LINE_Y, canvas.width, 5);

        // 노트
        notes.forEach(note => {
            if (note.hit) return;
            const y = JUDGE_LINE_Y - (note.time - currentTime) * 0.75;
            if (y > -50 && y < 950) drawNote(note, y);
            
            // 놓친 노트 처리 (Miss)
            if (y > JUDGE_LINE_Y + 50 && !note.hit) {
                note.hit = true;
                if(note.type === 'REAL') {
                   document.getElementById('judge-display').innerText = "MISS";
                }
            }
        });

        requestAnimationFrame(draw);
    }

    // 판정 함수
    function checkHit(lane) {
        if (audio.paused) return;
        const currentTime = audio.currentTime * 1000;
        
        for (let note of notes) {
            if (note.hit || note.lane !== lane) continue;
            const noteY = JUDGE_LINE_Y - (note.time - currentTime) * 0.75;
            
            if (Math.abs(noteY - JUDGE_LINE_Y) < 60) {
                note.hit = true;
                if (note.type === 'REAL') {
                    score += 100;
                    document.getElementById('judge-display').innerText = "PERFECT!";
                } else {
                    life += 15; // Fake 노트를 누르면 의심도 대폭 상승
                    document.getElementById('judge-display').innerText = "BUSTED!!";
                }
                document.getElementById('score').innerText = score;
                document.getElementById('life').innerText = life;
                break; 
            }
        }
    }

    // 입력 이벤트
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { controlAudio(); e.preventDefault(); }
        if (e.key === 's' || e.key === 'S') { keyEffect[0] = true; checkHit(1); }
        if (e.key === 'd' || e.key === 'D') { keyEffect[1] = true; checkHit(2); }
        if (e.key === 'f' || e.key === 'F') { keyEffect[2] = true; checkHit(3); }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 's' || e.key === 'S') keyEffect[0] = false;
        if (e.key === 'd' || e.key === 'D') keyEffect[1] = false;
        if (e.key === 'f' || e.key === 'F') keyEffect[2] = false;
    });

    function controlAudio() { audio.paused ? audio.play() : audio.pause(); }

    draw();
</script>
</body>
</html>
