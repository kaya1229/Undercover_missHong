    function drawNote(note, y) {
        const x = (note.lane - 1) * LANE_WIDTH + (LANE_WIDTH / 2);
        const w = 120;
        const h = 50;

        ctx.save();
        ctx.translate(x, y);

        // 지폐 본체 (테두리 추가)
        ctx.strokeStyle = "black";
        ctx.lineWidth = 2;
        ctx.fillStyle = note.type === 'REAL' ? "#2e7d32" : "#d32f2f";
        ctx.fillRect(-w/2, -h/2, w, h);
        ctx.strokeRect(-w/2, -h/2, w, h);

        if (note.type === 'REAL') {
            // 일반 지폐 디자인 (얼굴 없음)
            ctx.fillStyle = "#f5f5dc";
            ctx.fillRect(-15, -h/2 + 5, 30, h-10);
            ctx.fillStyle = "black";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("₩", 0, 7);
        } else {
            // 회장님 지폐 (얼굴 포함)
            ctx.fillStyle = "#FFDAB9";
            ctx.fillRect(-20, -15, 40, 30); // 얼굴 영역
            ctx.strokeStyle = "black";
            ctx.strokeRect(-20, -15, 40, 30); // 테두리
            
            // 눈 (박신혜 배우 느낌 - 크고 또렷하게)
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(-10, -5, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, -5, 4, 0, Math.PI * 2); ctx.fill();
            
            // 엄격한 눈썹
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-15, -12); ctx.lineTo(-5, -10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(15, -12); ctx.lineTo(5, -10); ctx.stroke();
        }
        ctx.restore();
    }

    function drawCharacter() {
        const charX = (LANE_WIDTH * 1.5);
        const charY = 820;

        ctx.save();
        ctx.translate(charX, charY);
        
        // 캐릭터 외곽선(테두리) 추가
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;

        // 긴 머리 (홍금보 스타일)
        ctx.fillStyle = "#222";
        ctx.fillRect(-35, -45, 70, 60); 
        ctx.strokeRect(-35, -45, 70, 60);

        // 얼굴
        ctx.fillStyle = "#ffe0bd";
        ctx.fillRect(-25, -35, 50, 45);
        ctx.strokeRect(-25, -35, 50, 45);

        // 큰 눈 (박신혜 느낌)
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(-12, -18, 6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(12, -18, 6, 0, Math.PI * 2); ctx.fill();

        // 몸체 (셔츠)
        ctx.fillStyle = "#f5f5dc";
        ctx.fillRect(-30, 10, 60, 50);
        ctx.strokeRect(-30, 10, 60, 50);

        ctx.restore();
    }

        document.getElementById('timeDisplay').innerText = audio.currentTime.toFixed(2);

        // 레인 가이드
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        for(let i=1; i<LANE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i*LANE_WIDTH, 0); ctx.lineTo(i*LANE_WIDTH, 900); ctx.stroke();
        }

        // 판정선
        ctx.fillStyle = "#4caf50";
        ctx.fillRect(0, 780, canvas.width, 10);

        // 노트 렌더링
        notes.forEach(note => {
            if (note.hit) return;
            const y = 780 - (note.time - currentTime) * 0.7; // 속도 조절
            if (y > -100 && y < 900) drawNote(note, y);
        });

        drawCharacter();
        requestAnimationFrame(draw);
    }

    function controlAudio() { audio.paused ? audio.play() : audio.pause(); }
    function toggleMode() { /* 모드 전환 로직 */ }

    draw();
</script>
</body>
</html>
