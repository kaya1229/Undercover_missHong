<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>언더커버 미쓰홍 1980 (MOBILE)</title>
    <style>
        :root {
            --retro-gold: #ffd700;
            --retro-pink: #ff69b4;
            --retro-blue: #00ffff;
            --retro-bg: #120909; /* 더 어두운 배경 */
            --terminal-green: #33ff33;
            --krw-green: #2e7d32; /* 만원권 초록색 */
            --frame-brown: #3d2424;
        }

        body { 
            background: var(--retro-bg); 
            color: #fff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            /* 배경 패턴을 더 미세하게 */
            background-image: radial-gradient(circle, #2c1a1a 1px, transparent 1px);
            background-size: 15px 15px;
            -webkit-touch-callout: none; /* 롱터치 방지 */
            -webkit-user-select: none; /* 텍스트 선택 방지 */
            user-select: none;
        }

        /* 스마트폰 화면에 꽉 차게 조절 (최대폭 제한) */
        #game-container { 
            position: relative; 
            width: 100%; 
            max-width: 500px; /* 모바일 세로폭 제한 */
            height: 100%; 
            background: #000; 
            display: flex; 
            flex-direction: column; /* 세로 배치 */
            border: 8px solid var(--frame-brown); /* 프레임 축소 */
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 50px #000;
            border-radius: 15px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 상단 UI 영역 */
        #ui-top {
            height: 15%; /* 높이 축소 */
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #2c1a1a 0%, #000 100%);
            border-bottom: 4px double var(--frame-brown);
            box-sizing: border-box;
            z-index: 10;
        }

        #ui-top h1 { 
            font-size: 16px; /* 크기 축소 */
            color: var(--retro-pink); 
            text-shadow: 2px 2px var(--retro-blue);
            margin: 0;
            line-height: 1.1;
        }

        .stat-group { text-align: right; }
        .stat-label { color: var(--retro-blue); font-size: 10px; letter-spacing: 1px; }
        .stat-value { 
            font-size: 20px; /* 크기 축소 */
            color: var(--terminal-green); 
            text-shadow: 0 0 5px var(--terminal-green);
            font-weight: bold;
        }

        /* 캔버스 영역 */
        #game-canvas { 
            width: 100%; 
            height: 65%; /* 모바일에서 캔버스 비중 확대 */
            background: #050505; 
            image-rendering: pixelated; /* 픽셀 깨짐 효과 유지 */
            display: block;
        }

        /* CRT 모니터 효과 (캔버스 위에만) */
        .crt-overlay {
            position: absolute;
            top: 15%; /* ui-top 아래부터 */
            left: 0; width: 100%; height: 65%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
            z-index: 5;
            pointer-events: none;
        }

        /* 판정 디스플레이 (캔버스 중앙 위에 띄움) */
        #judge-display {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 900;
            font-style: italic;
            z-index: 6;
            text-shadow: 0 0 10px #fff;
            pointer-events: none;
        }

        /* 하단 모바일 터치 컨트롤 영역 */
        #touch-controls {
            height: 20%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #1a0f0f;
            border-top: 4px solid var(--frame-brown);
            padding: 10px;
            box-sizing: border-box;
        }

        .touch-btn {
            width: 28%;
            height: 80%;
            background: linear-gradient(145deg, #3d2424, #1a0f0f);
            border: 4px outset #5e3535;
            border-radius: 10px;
            color: var(--retro-gold);
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 0 #000;
            transition: 0.05s;
        }

        /* 터치 시 피드백 */
        .touch-btn:active {
            border-style: inset;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #000;
            background: #ff69b4; /* 핑크색으로 반전 */
            color: #fff;
        }

        /* 스타트 버튼 (상단 UI에 배치) */
        .btn-start {
            padding: 8px 15px;
            background: var(--retro-pink);
            color: white;
            border: 3px outset var(--retro-pink);
            font-weight: bold;
            font-size: 12px;
            border-radius: 5px;
            z-index: 11;
        }
        .btn-start:active { border-style: inset; }

    </style>
</head>

<div id="game-container">
    <div id="ui-top">
        <h1>UNDERCOVER<br>MISS HONG 1980</h1>
        <button class="btn-start" onclick="startGame()">MISSION<br>START</button>
        <div class="stat-group">
            <div class="stat-label">CASH</div>

            <div class="stat-value" style="font-size:16px; color:#ff4444;"><span id="life">0</span>%</div>
        </div>
    </div>

    <div class="crt-overlay"></div>
    <div id="judge-display"></div>
    <canvas id="game-canvas"></canvas>

    let currentNotes = [];

    function startGame() {
        if(isPlaying) return;
        
        // 모바일 오디오 재생 이슈 해결을 위해 user interaction 안에서 play
        audio.currentTime = 0;
        audio.play().then(() => {
            console.log("Audio started");
        }).catch(e => {
            console.error("Audio failed. 터치 버튼을 이용하세요.", e);
        });

        score = 0; life = 0; isPlaying = true;
        // 깊은 복사 후 무작위 FAKE(회장님) 생성
        currentNotes = JSON.parse(JSON.stringify(masterNotes)).map(n => {
            if(Math.random() < 0.15) n.type = 'FAKE';
            return n;
        });
        updateUI();
    }

    // --- 모바일 터치 이벤트 처리 ---
    const touchBtns = document.querySelectorAll('.touch-btn');
    touchBtns.forEach(btn => {
        // mousedown/touchstart 모두 대응 (PC/모바일 하이브리드)
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 기본 브라우저 행동(스크롤 등) 방지
            if (!isPlaying) return;
            let lane = parseInt(btn.getAttribute('data-lane'));
            checkHit(audio.currentTime * 1000, lane);
        });
        
        // PC 테스트용
        btn.addEventListener('mousedown', (e) => {
            if (!isPlaying || 'ontouchstart' in window) return; // 모바일이면 무시
            let lane = parseInt(btn.getAttribute('data-lane'));
            checkHit(audio.currentTime * 1000, lane);
        });
    });

    // 기존 키보드 입력도 유지
    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        let lane = ['1','2','3'].indexOf(e.key) + 1;
        if (lane > 0) checkHit(audio.currentTime * 1000, lane);
    });

    function checkHit(curT, lane) {
        // 판정 범위 완화 (모바일 터치 랙 고려, +- 180ms)
        const hitNote = currentNotes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - curT) < 180);
        
        if (hitNote) {
            hitNote.hit = true;
            if (hitNote.type === 'REAL') {
                score += 10000; showJudge("SUCCESS", "#00ffff"); characterState = 'HIT';
            } else {
                life += 20; showJudge("DANGER!", "#ff0000"); characterState = 'PANIC';
            }
            updateUI();
            // 캐릭터 상태 복구
            setTimeout(() => { if(characterState !== 'IDLE') characterState = 'IDLE'; }, 300);
        }
    }

    function showJudge(txt, color) {
        const d = document.getElementById('judge-display');
        d.innerText = txt; d.style.color = color;
        // 네온 효과 강하게
        d.style.textShadow = `0 0 15px ${color}, 0 0 5px #fff`;
        // 일정 시간 후 제거 (동일한 텍스트일 때만)
        setTimeout(() => { if(d.innerText === txt) d.innerText = ""; }, 400);
    }

    function updateUI() {
        document.getElementById('score').innerText = score.toLocaleString();
        document.getElementById('life').innerText = life;
        if(life >= 100) {
            isPlaying = false;
            audio.pause();
            // 즉시 그리기 멈추기 위해 requestAnimationFrame 취소는 생략, state로 관리
            setTimeout(() => {
                alert(`MISSION FAILED!\nRECOVERED: ₩${score.toLocaleString()}\n작전 실패. 정체가 탄로 났습니다.`);
            }, 100);
        }
    }

            ctx.fillStyle = "#000"; ctx.fillRect(-35, -65, 70, 110); // 긴머리
            ctx.fillStyle = "#ffe0bd"; ctx.fillRect(-30, -35, 60, 35); // 얼굴
            // 당황한 눈 (픽셀 X자)
            ctx.fillStyle = "#444"; 
            ctx.font = "bold 15px Arial"; ctx.fillText("X", -18, -12); ctx.fillText("X", 8, -12);
            
            ctx.fillStyle = "#000044"; ctx.fillRect(-40, 0, 80, 60); // 정장
            ctx.fillStyle = "#fff"; ctx.fillRect(-10, 0, 20, 60); // 와이셔츠
        }
        ctx.restore();
    }

    function drawMissHong() {
        // [미쓰홍] 기본 변신 - 긴 생머리 + 선글라스 + 네이비 정장
        ctx.fillStyle = "#000"; ctx.fillRect(-35, -65, 70, 110); // 긴머리
        ctx.fillStyle = "#ffe0bd"; ctx.fillRect(-30, -35, 60, 35); // 얼굴
        ctx.fillStyle = "#ffd700"; ctx.fillRect(-28, -22, 56, 3); // 선글라스 테
        ctx.fillStyle = "#000"; ctx.fillRect(-25, -20, 20, 13); ctx.fillRect(5, -20, 20, 13); // 알
        ctx.fillStyle = "#000044"; ctx.fillRect(-40, 0, 80, 60); // 정장
        ctx.fillStyle = "#fff"; ctx.fillRect(-10, 0, 20, 60); // 와이셔츠
    }

    function drawNote(n, y) {
        LANE_WIDTH = canvas.width / LANE_COUNT;
        // 지폐 크기 모바일 최적화 (가로폭 늘림, 세로폭 축소)
        const margin = 10;
        const x = (n.lane - 1) * LANE_WIDTH + margin;
        const w = LANE_WIDTH - margin * 2;
        const h = 50; 
        
        ctx.save();
        
        // 1. 공통 지폐 초록색 배경 (REAL과 FAKE 색상 동일하게 설정)
        ctx.fillStyle = varColor('--krw-green');
        ctx.fillRect(x, y, w, h);

        // 2. 공통 테두리 (약간 더 진한 초록색)
        ctx.strokeStyle = "#1b5e20"; 
        ctx.lineWidth = 3; 
        ctx.strokeRect(x, y, w, h);

        // 3. 픽셀 디자인 (격자무늬 효과)
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        for(let py=2; py<h; py+=4){ ctx.fillRect(x+2, y+py, w-4, 2); }

        if (n.type === 'REAL') {
            // [REAL] 세종대왕 픽셀 실루엣 (단순화)
            ctx.fillStyle = "#1b5e20"; // 진한 초록색으로 형체만
            ctx.fillRect(x+w*0.3, y+10, w*0.35, h-20); // 몸체
            ctx.fillRect(x+w*0.4, y+5, w*0.15, 10); // 모자
            
            // 띠지 (픽셀 느낌)
            ctx.fillStyle = "rgba(245, 245, 220, 0.8)"; // 크림색 투명하게
            ctx.fillRect(x + w*0.7, y, w*0.15, h); 
            
            // 숫자 10000 (픽셀 폰트처럼)
            drawPixelText("10000", x+8, y+h*0.75, 16, "#fff");
            
        } else {
            // [FAKE - 회장님] 동일 초록 배경 위에 회장님 픽셀 얼굴
            // 얼굴 바탕
            ctx.fillStyle = "#ffe0bd"; ctx.fillRect(x+w*0.35, y+8, w*0.3, h-16);
            // 올백 머리 (회색 픽셀)
            ctx.fillStyle = "#777"; ctx.fillRect(x+w*0.33, y+4, w*0.34, 10);
            // 선글라스 (픽셀)
            ctx.fillStyle = "#000"; ctx.fillRect(x+w*0.38, y+15, w*0.24, 8);
            // 입 (앙다문 일자)
            ctx.fillRect(x+w*0.45, y+32, w*0.1, 2);
            
            // FAKE 텍스트 강조 (빨간색 픽셀)
            drawPixelText("FAKE", x+8, y+h*0.75, 16, "#ff4444");
        }
        ctx.restore();
    }
    
    // CSS 변수 가져오기 헬퍼
    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function render() {
        if(!canvas.width) return requestAnimationFrame(render); // 해상도 설정 전 방지

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cur = audio.currentTime * 1000;

        LANE_WIDTH = canvas.width / LANE_COUNT;
        JUDGE_LINE_Y = canvas.height * 0.8;

        // 네온 레인 구분선
        ctx.strokeStyle = "rgba(0, 255, 255, 0.1)";
        for(let i=1; i<LANE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i*LANE_WIDTH, 0); ctx.lineTo(i*LANE_WIDTH, canvas.height); ctx.stroke();
        }

        // 판정선 (CSS와 위치 맞춤, 네온 핑크 글로우)
        ctx.shadowBlur = 10; ctx.shadowColor = varColor("--retro-pink");
        ctx.fillStyle = "#ff69b4"; 
        ctx.fillRect(0, JUDGE_LINE_Y, canvas.width, 6);
        ctx.shadowBlur = 0;

        if (isPlaying) {
            currentNotes.forEach(n => {
                if (n.hit) return;
                // 하강 속도 조절 (모바일 세로 길이에 맞춰 0.75 -> 0.6으로 약간 하향)
                let ny = JUDGE_LINE_Y - (n.time - cur) * 0.6; 
                
                // 화면 안에 있을 때만 그리기
                if (ny > -70 && ny < canvas.height) {
                    drawNote(n, ny);
                }
                
                // 놓친 노트 처리 (Miss)
                if (ny > JUDGE_LINE_Y + 50 && !n.hit) {
                    n.hit = true; 
                    if(n.type === 'REAL') { 
                        life += 10; // 진짜 지폐 놓치면 의심도 상승
                        updateUI(); 
                        showJudge("MISS", "#555");
                    } else {
                        // 가짜 지폐는 그냥 보내도 됨 (성공)
                        showJudge("SAFE", "#aaa");
                    }
                }
            });
            drawCharacter();
        }
        requestAnimationFrame(render);
    }
    
    // 초기 렌더링 시작
    requestAnimationFrame(render);
</script>
