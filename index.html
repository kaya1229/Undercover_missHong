<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>언더커버 미쓰홍: 비자금 디펜스 (최종 통합본)</title>
    <style>
        :root { --bg: #f5f5dc; --panel: #dcdcae; --accent: #333; --green: #2e7d32; --red: #d32f2f; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        
        #game-container { position: relative; width: 900px; height: 950px; background: #222; display: flex; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 8px solid var(--accent); border-radius: 12px; }
        #game-canvas { width: 65%; height: 100%; background: #1a1a1a; border-right: 4px solid var(--accent); image-rendering: pixelated; }
        
        #ui-side { width: 35%; height: 100%; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; background: var(--panel); overflow-y: auto; }
        
        .mode-indicator { font-size: 24px; font-weight: 900; text-align: center; padding: 12px; margin-bottom: 20px; border: 4px solid var(--accent); border-radius: 5px; }
        .MODE-EDIT { background: #ffeb3b; color: #000; }
        .MODE-PLAY { background: var(--green); color: #fff; }

        .stat-box { background: rgba(255,255,255,0.8); padding: 12px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; border: 2px solid var(--accent); }
        .btn { padding: 12px; background: var(--accent); color: white; border: none; cursor: pointer; margin-top: 8px; font-weight: bold; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #555; }
        
        textarea { width: 100%; height: 100px; margin-top: 10px; font-size: 10px; background: #eee; border: 1px solid #999; border-radius: 4px; resize: none; }
        
        #judge-display { font-size: 48px; font-weight: 900; text-align: center; height: 60px; margin-top: 20px; text-shadow: 2px 2px 0px #000; }
        .instruction { font-size: 12px; color: #444; margin-top: auto; line-height: 1.4; padding: 10px; background: rgba(255,255,255,0.3); border-radius: 4px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas" width="585" height="950"></canvas>
    
    <div id="ui-side">
        <div id="modeTag" class="mode-indicator MODE-EDIT">EDITOR MODE</div>
        
        <button class="btn" style="background: #5c5c5c;" onclick="toggleMode()">모드 전환 (Tab)</button>
        
        <div class="stat-box">
            TIME: <span id="timeDisplay">0.00</span>s<br>
            NOTES: <span id="noteCount">0</span>
        </div>

        <div id="playStats" style="display:none;">
            <div class="stat-box" style="color: var(--green); font-size: 1.2em;">CASH: ₩<span id="score">0</span></div>
            <div class="stat-box" style="color: var(--red);">SUSPICION: <span id="life">0</span>%</div>
            <div id="judge-display"></div>
        </div>

        <button class="btn" onclick="controlAudio()">음악 재생/정지 (Space)</button>
        
        <p style="font-weight: bold; margin-bottom: 0;">장부 데이터 (JSON)</p>
        <textarea id="dataArea" placeholder="데이터를 여기에 붙여넣고 '데이터 적용'을 누르세요."></textarea>
        <button class="btn" onclick="importData()">데이터 적용 (Import)</button>
        <button class="btn" onclick="exportData()">데이터 복사 (Export)</button>
        <button class="btn" style="background:var(--red);" onclick="clearNotes()">전체 초기화</button>

        <div class="instruction">
            [1, 2, 3, 4, 5] : 레인 입력<br>
            [Shift + 숫자] : FAKE(회장님) 노트 생성<br>
            [Tab] : 모드 전환 | [Space] : 재생
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const audio = new Audio('dance_tonight.mp3'); // 파일명이 정확해야 함
    
    let currentMode = 'EDIT'; 
    let notes = []; 
    let score = 0;
    let life = 0; 
    let characterState = 'IDLE'; 
    const LANE_COUNT = 5;
    const LANE_WIDTH = canvas.width / LANE_COUNT;

    // --- 핵심 로직 ---

    function toggleMode() {
        currentMode = (currentMode === 'EDIT') ? 'PLAY' : 'EDIT';
        document.getElementById('modeTag').innerText = currentMode + " MODE";
        document.getElementById('modeTag').className = `mode-indicator MODE-${currentMode}`;
        document.getElementById('playStats').style.display = (currentMode === 'PLAY') ? 'block' : 'none';
        
        // 플레이 모드 진입 시 초기화
        notes.forEach(n => n.hit = false);
        score = 0; life = 0; characterState = 'IDLE';
        updateUI();
    }

    function controlAudio() { 
        if(audio.paused) audio.play(); 
        else audio.pause(); 
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') { e.preventDefault(); controlAudio(); }
        if (e.code === 'Tab') { e.preventDefault(); toggleMode(); }

        let lane = ['1','2','3','4','5'].indexOf(e.key.replace('!', '1').replace('@', '2').replace('#', '3').replace('$', '4').replace('%', '5')) + 1;
        
        if (lane > 0 && !audio.paused) {
            const currentTime = Math.floor(audio.currentTime * 1000);
            if (currentMode === 'EDIT') {
                // Shift와 함께 누르면 FAKE 생성
                const type = e.shiftKey ? 'FAKE' : 'REAL';
                notes.push({ time: currentTime, lane: lane, type: type, hit: false });
                notes.sort((a, b) => a.time - b.time);
                updateUI();
            } else {
                checkHit(currentTime, lane);
            }
        }
    });

    function checkHit(currentTime, lane) {
        // 판정 범위: 180ms
        const hitNote = notes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - currentTime) < 180);
        if (hitNote) {
            hitNote.hit = true;
            if (hitNote.type === 'REAL') {
                score += 10000;
                showJudge("回數!", "#FFD700");
                characterState = 'HIT';
            } else {
                life += 20;
                showJudge("檢거!", "red");
                characterState = 'MISS';
            }
            updateUI();
            setTimeout(() => characterState = 'IDLE', 400);
        }
    }

    function showJudge(txt, color) {
        const d = document.getElementById('judge-display');
        d.innerText = txt; d.style.color = color;
        setTimeout(() => { if(d.innerText === txt) d.innerText = ""; }, 500);
    }

    function updateUI() {
        document.getElementById('score').innerText = score.toLocaleString();
        document.getElementById('life').innerText = life;
        document.getElementById('noteCount').innerText = notes.length;
        if (life >= 100) { 
            audio.pause(); 
            alert("정체가 들통났습니다! 비자금 장부가 압수됩니다."); 
            toggleMode(); 
        }
    }

    // --- 렌더링 엔진 (도트 그래픽) ---

    function drawNote(note, y) {
        const x = (note.lane - 1) * LANE_WIDTH + 10;
        const w = LANE_WIDTH - 20;
        const h = 45;

        ctx.save();
        // 공통 그림자
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(x+4, y+4, w, h);

        if (note.type === 'REAL') {
            // [진짜: 초록색 만원다발]
            ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, y, w, h);
            ctx.fillStyle = "#f5f5dc"; ctx.fillRect(x + w*0.35, y, w*0.3, h); // 띠지
            ctx.fillStyle = "#fff"; ctx.font = "bold 14px monospace"; 
            ctx.fillText("₩10000", x+5, y+28);
            // 디테일 (도트 테두리)
            ctx.strokeStyle = "#1b5e20"; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
        } else {
            // [가짜: 회장님 얼굴 지폐]
            ctx.fillStyle = "#556b2f"; ctx.fillRect(x, y, w, h);
            // 회장님 도트 얼굴 (회색 머리, 엄격한 표정)
            ctx.fillStyle = "#FFDAB9"; ctx.fillRect(x+12, y+10, 20, 25); // 얼굴
            ctx.fillStyle = "#888"; ctx.fillRect(x+10, y+5, 24, 8); // 머리
            ctx.fillStyle = "#000"; ctx.fillRect(x+16, y+18, 2, 2); ctx.fillRect(x+26, y+18, 2, 2); // 눈
            
            ctx.strokeStyle = "red"; ctx.lineWidth = 3; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = "red"; ctx.font = "bold 10px sans-serif"; ctx.fillText("FAKE", x+w-30, y+40);
        }
        ctx.restore();
    }

    function drawCharacter() {
        const x = canvas.width / 2, y = 840;
        ctx.save(); ctx.translate(x, y);

        if (characterState === 'IDLE') {
            // [홍장미 사원: 별 핀 + 분홍 폴로]
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-25, -45, 50, 35); // 머리
            ctx.fillStyle = "#FFB6C1"; ctx.fillRect(-15, -40, 10, 10); // 별 핀 (핑크)
            ctx.fillStyle = "#FFDAB9"; ctx.fillRect(-20, -15, 40, 25); // 얼굴
            ctx.fillStyle = "pink"; ctx.fillRect(-25, 10, 50, 35); // 분홍 셔츠
            ctx.fillStyle = "white"; ctx.fillRect(-15, 10, 5, 35); ctx.fillRect(10, 10, 5, 35); // 가방 끈
        } else if (characterState === 'HIT') {
            // [미쓰홍 요원: 선글라스 + 네이비 수트]
            ctx.fillStyle = "#000033"; ctx.fillRect(-28, -50, 56, 90); // 수트
            ctx.fillStyle = "#FFDAB9"; ctx.fillRect(-20, -20, 40, 20); // 얼굴부
            ctx.fillStyle = "black"; ctx.fillRect(-18, -15, 12, 8); ctx.fillRect(6, -15, 12, 8); // 선글라스
            ctx.strokeStyle = "gold"; ctx.strokeRect(-18, -15, 12, 8); ctx.strokeRect(6, -15, 12, 8);
        } else if (characterState === 'MISS') {
            // [당황: 땀방울]
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-25, -45, 50, 35);
            ctx.fillStyle = "#FFDAB9"; ctx.fillRect(-20, -15, 40, 25);
            ctx.fillStyle = "cyan"; ctx.fillRect(25, -20, 5, 10); // 식은땀 도트
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cur = audio.currentTime * 1000;
        document.getElementById('timeDisplay').innerText = audio.currentTime.toFixed(2);

        // 레인 구분선
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for(let i=1; i<LANE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i*LANE_WIDTH, 0); ctx.lineTo(i*LANE_WIDTH, 950); ctx.stroke();
        }

        // 판정선
        ctx.fillStyle = (currentMode === 'EDIT') ? "#ffeb3b" : "#4caf50";
        ctx.fillRect(0, 750, canvas.width, 10);

        // 노트 그리기
        notes.forEach(n => {
            if (n.hit) return;
            let ny = 750 - (n.time - cur) * 0.75; // 속도 가중치
            if (ny > -50 && ny < 950) drawNote(n, ny);
            
            // 놓친 노트 (Miss)
            if (currentMode === 'PLAY' && ny > 800 && !n.hit) {
                n.hit = true;
                if(n.type === 'REAL') { life += 5; showJudge("MISS", "gray"); }
                updateUI();
            }
        });

        if (currentMode === 'PLAY') drawCharacter();
        requestAnimationFrame(draw);
    }

    // --- 데이터 관리 기능 ---
    function exportData() {
        const data = JSON.stringify(notes);
        document.getElementById('dataArea').value = data;
        navigator.clipboard.writeText(data);
        alert("데이터가 복사되었습니다!");
    }

    function importData() {
        try {
            const data = JSON.parse(document.getElementById('dataArea').value);
            notes = data;
            notes.sort((a, b) => a.time - b.time);
            updateUI();
            alert("장부 데이터를 성공적으로 불러왔습니다.");
        } catch(e) { alert("데이터 형식이 올바르지 않습니다."); }
    }

    function clearNotes() { if(confirm("정말 장부를 초기화할까요?")) { notes = []; updateUI(); } }

    draw();
</script>
</body>
</html>
