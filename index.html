<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>언더커버 미쓰홍 1980</title>
    <style>
        :root {
            --retro-gold: #ffd700;
            --retro-pink: #ff69b4;
            --retro-blue: #00ffff;
            --retro-bg: #1a0f0f;
            --terminal-green: #33ff33;
        }

        body { 
            background: var(--retro-bg); 
            color: #fff;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            background-image: radial-gradient(circle, #2c1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 가구 느낌의 브라운 프레임 */
        #game-container { 
            position: relative; 
            width: 850px; 
            height: 900px; 
            background: #000; 
            display: flex; 
            border: 15px solid #3d2424;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px #000;
            border-radius: 25px;
        }

        #game-canvas { 
            width: 65%; 
            height: 100%; 
            background: #080808; 
            border-right: 6px double #3d2424;
            image-rendering: pixelated;
        }

        #ui-side { 
            width: 35%; 
            padding: 35px; 
            display: flex; 
            flex-direction: column; 
            background: linear-gradient(180deg, #2c1a1a 0%, #000 100%);
            box-sizing: border-box;
        }

        h1 { 
            font-size: 26px; 
            color: var(--retro-pink); 
            text-align: center; 
            text-shadow: 3px 3px var(--retro-blue);
            line-height: 1.2;
            margin-bottom: 40px;
        }

        .stat-group { margin-bottom: 25px; }
        .stat-label { color: var(--retro-blue); font-size: 14px; letter-spacing: 1px; }
        .stat-value { 
            font-size: 32px; 
            color: var(--terminal-green); 
            text-shadow: 0 0 10px var(--terminal-green);
            font-weight: bold;
        }

        .btn-start {
            padding: 20px;
            background: var(--retro-pink);
            color: white;
            border: 5px outset var(--retro-pink);
            font-weight: bold;
            cursor: pointer;
            font-size: 20px;
            margin-bottom: 30px;
            transition: 0.1s;
        }
        .btn-start:active { border-style: inset; transform: scale(0.98); }

        #judge-display {
            font-size: 45px;
            font-weight: 900;
            text-align: center;
            height: 60px;
            margin-top: 20px;
            font-style: italic;
        }

        /* CRT 모니터 효과 */
        .crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 65%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
            border-radius: 10px 0 0 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="crt-overlay"></div>
    <canvas id="game-canvas" width="550" height="900"></canvas>
    <div id="ui-side">
        <h1>UNDERCOVER<br>MISS HONG<br>1980</h1>
        
        <button class="btn-start" onclick="startGame()">MISSION START</button>

        <div class="stat-group">
            <div class="stat-label">RECOVERED CASH</div>
            <div class="stat-value">₩<span id="score">0</span></div>
        </div>

        <div class="stat-group">
            <div class="stat-label">SUSPICION</div>
            <div class="stat-value"><span id="life">0</span>%</div>
        </div>

        <div id="judge-display"></div>

        <div style="margin-top: auto; font-size: 12px; color: #777; line-height: 1.6; border: 1px dashed #444; padding: 10px;">
            <b style="color:var(--retro-gold)">[OPERATIVE MANUAL]</b><br>

            - <span style="color:#ff4444;">FAKE:</span> +20% SUSPICION
        </div>
    </div>
</div>

    let currentNotes = [];

    function startGame() {
        score = 0; life = 0; isPlaying = true;
        // 깊은 복사 후 무작위 FAKE(회장님) 생성
        currentNotes = JSON.parse(JSON.stringify(masterNotes)).map(n => {
            if(Math.random() < 0.15) n.type = 'FAKE';
            return n;
        });
        audio.currentTime = 0;
        audio.play();
        updateUI();
    }

    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        let lane = ['1','2','3'].indexOf(e.key) + 1;
        if (lane > 0) checkHit(audio.currentTime * 1000, lane);
    });

    function checkHit(curT, lane) {
        const hitNote = currentNotes.find(n => !n.hit && n.lane === lane && Math.abs(n.time - curT) < 150);
        if (hitNote) {
            hitNote.hit = true;
            if (hitNote.type === 'REAL') {
                score += 10000; showJudge("SUCCESS", "#00ffff"); characterState = 'HIT';
            } else {
                life += 20; showJudge("DANGER!", "#ff0000"); characterState = 'PANIC';
            }
            updateUI();
            setTimeout(() => characterState = 'IDLE', 500);
        }
    }

    function showJudge(txt, color) {
        const d = document.getElementById('judge-display');
        d.innerText = txt; d.style.color = color;
        setTimeout(() => { if(d.innerText === txt) d.innerText = ""; }, 500);
    }

    function updateUI() {
        document.getElementById('score').innerText = score.toLocaleString();
        document.getElementById('life').innerText = life;
        if(life >= 100) {
            isPlaying = false;
            audio.pause();
            alert("정체가 탄로 났습니다! 작전 실패.");
        }
    }

    // --- 강화된 픽셀 아트 렌더링 ---

    function drawCharacter() {
        const x = canvas.width / 2, y = 780;
        ctx.save(); ctx.translate(x, y);

        if (characterState !== 'HIT' && characterState !== 'PANIC') {
            // [홍장미] 웨이브 단발 + 별핀 + 초롱초롱 눈
            ctx.fillStyle = "#2d1a10"; ctx.fillRect(-40, -65, 80, 50); // 머리
            ctx.fillRect(-45, -35, 20, 30); ctx.fillRect(25, -35, 20, 30); // 웨이브
            ctx.fillStyle = "#ff69b4"; ctx.fillRect(-30, -58, 14, 14); // 별핀
            ctx.fillStyle = "#ffe0bd"; ctx.fillRect(-35, -30, 70, 40); // 얼굴
            ctx.fillStyle = "#fff"; ctx.fillRect(-22, -18, 12, 10); ctx.fillRect(10, -18, 12, 10); // 눈
            ctx.fillStyle = "#000"; ctx.fillRect(-17, -15, 5, 5); ctx.fillRect(15, -15, 5, 5); // 눈동자
            ctx.fillStyle = "pink"; ctx.fillRect(-40, 10, 80, 45); // 셔츠
            ctx.fillStyle = "#fff"; ctx.fillRect(-25, 10, 8, 45); ctx.fillRect(17, 10, 8, 45); // 가방끈
        } else {
            // [미쓰홍] 긴 생머리 + 선글라스 + 네이비 정장
            ctx.fillStyle = "#000"; ctx.fillRect(-40, -70, 80, 120); // 긴머리
            ctx.fillStyle = "#ffe0bd"; ctx.fillRect(-35, -35, 70, 40); // 얼굴
            ctx.fillStyle = "#ffd700"; ctx.fillRect(-30, -22, 60, 3); // 선글라스 테
            ctx.fillStyle = "#000"; ctx.fillRect(-28, -20, 22, 15); ctx.fillRect(6, -20, 22, 15); // 알
            ctx.fillStyle = "#000044"; ctx.fillRect(-45, 5, 90, 70); // 정장
            ctx.fillStyle = "#fff"; ctx.fillRect(-12, 5, 24, 70); // 와이셔츠
        }
        ctx.restore();
    }

    function drawNote(n, y) {
        const x = (n.lane - 1) * LANE_WIDTH + 25, w = LANE_WIDTH - 50, h = 60;
        ctx.save();
        if (n.type === 'REAL') {
            ctx.fillStyle = "#2e7d32"; ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = "#1b5e20"; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = "#f5f5dc"; ctx.fillRect(x + w*0.35, y, w*0.3, h); // 띠지
            ctx.fillStyle = "#fff"; ctx.font = "bold 18px monospace"; ctx.fillText("10000", x+15, y+38);
        } else {
            // [회장님 얼굴] 눈썹, 올백머리, 인상 쓴 눈매
            ctx.fillStyle = "#4a4a4a"; ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = "#ff0000"; ctx.lineWidth = 4; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = "#ffe0bd"; ctx.fillRect(x+w/2-25, y+10, 50, 40); // 얼굴
            ctx.fillStyle = "#999"; ctx.fillRect(x+w/2-28, y+5, 56, 12); // 올백 머리
            ctx.fillStyle = "#333"; ctx.fillRect(x+w/2-20, y+22, 15, 4); ctx.fillRect(x+w/2+5, y+22, 15, 4); // 짙은 눈썹
            ctx.fillStyle = "#000"; ctx.fillRect(x+w/2-18, y+28, 10, 2); ctx.fillRect(x+w/2+8, y+28, 10, 2); // 찢어진 눈매
            ctx.fillStyle = "#888"; ctx.fillRect(x+w/2-10, y+45, 20, 3); // 앙다문 입
        }
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cur = audio.currentTime * 1000;

        // 네온 레인 구분선
        ctx.strokeStyle = "rgba(0, 255, 255, 0.15)";
        for(let i=1; i<LANE_COUNT; i++) {
            ctx.beginPath(); ctx.moveTo(i*LANE_WIDTH, 0); ctx.lineTo(i*LANE_WIDTH, 900); ctx.stroke();
        }

        // 판정선 (네온 핑크 글로우)
        ctx.shadowBlur = 15; ctx.shadowColor = "var(--retro-pink)";
        ctx.fillStyle = "#ff69b4"; ctx.fillRect(0, 710, canvas.width, 10);
        ctx.shadowBlur = 0;

        if (isPlaying) {
            currentNotes.forEach(n => {
                if (n.hit) return;
                let ny = 710 - (n.time - cur) * 0.75;
                if (ny > -70 && ny < 900) drawNote(n, ny);
                if (ny > 760 && !n.hit) {
                    n.hit = true; 
                    if(n.type === 'REAL') { life += 10; updateUI(); }
                }
            });
            drawCharacter();
        }
        requestAnimationFrame(render);
    }
    render();
</script>
