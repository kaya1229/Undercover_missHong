        #ui-side { width: 33.4%; height: 100%; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; background: var(--panel); color: #000; box-shadow: inset 4px 4px 0 #fff, inset -4px -4px 0 #808080; }
        
        .stat-box { background: #000; color: #00ff00; padding: 15px; border: 3px inset #fff; margin-bottom: 15px; font-size: 18px; line-height: 1.6; }
        .btn { padding: 12px; background: #c0c0c0; color: #000; border: 3px outset #fff; cursor: pointer; margin-top: 10px; font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .btn:active { border: 3px inset #fff; }
        
        #judge-display { font-size: 36px; font-weight: bold; text-align: center; height: 60px; margin-top: 20px; color: #ff0000; text-shadow: 2px 2px #000; }
    </style>
</head>

        type: Math.random() < 0.18 ? 'FAKE' : 'REAL',

    // --- 그래픽 엔진 ---
    function drawNote(note, y) {
        const x = (note.lane - 1) * LANE_WIDTH + (LANE_WIDTH / 2);
        const w = 130; const h = 50;

        ctx.save();
        ctx.translate(x, y);

        // 90년대 도트 스타일: 검정 테두리 + 하이라이트

        ctx.fillStyle = note.type === 'REAL' ? "#2e7d32" : "#800000";
        ctx.fillRect(-w/2, -h/2, w, h);
        ctx.strokeRect(-w/2, -h/2, w, h);

        if (note.type === 'REAL') {
            // 일반 지폐 (초록 만원권 느낌)
            ctx.fillStyle = "#c0c0c0"; ctx.fillRect(-15, -h/2 + 5, 30, h-10);
            ctx.fillStyle = "#000"; ctx.font = "bold 24px monospace"; ctx.textAlign = "center";
            ctx.fillText("₩", 0, 8);
        } else {
            // 회장님 지폐 (도트 초상화)
            ctx.fillStyle = "#ffe0bd"; ctx.fillRect(-25, -18, 50, 36);
            ctx.strokeRect(-25, -18, 50, 36);
            
            // 눈 (박신혜 느낌 - 크고 맑게)

    function drawCharacter() {
        const charX = canvas.width / 2;
        const charY = 820;

        ctx.save();
        ctx.translate(charX, charY);
        
        // 홍금보 (긴 머리 + 진한 테두리)
        ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
        
        // 긴 머리 실루엣
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(-45, -50, 90, 80); ctx.strokeRect(-45, -50, 90, 80);

        // 얼굴
        ctx.fillStyle = "#ffe0bd";
        ctx.fillRect(-30, -35, 60, 50); ctx.strokeRect(-30, -35, 60, 50);

        // 박신혜 배우 느낌의 큰 눈
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(-14, -15, 7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(14, -15, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#fff"; // 눈동자 반짝임
        ctx.fillRect(-16, -18, 3, 3); ctx.fillRect(12, -18, 3, 3);

        // 의상 (레트로 정장)
        ctx.fillStyle = "#000080";
        ctx.fillRect(-35, 15, 70, 60); ctx.strokeRect(-35, 15, 70, 60);

        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const currentTime = audio.currentTime * 1000;
        document.getElementById('timeDisplay').innerText = audio.currentTime.toFixed(2);

        // 레인 배경
        for(let i=0; i<LANE_COUNT; i++) {
            ctx.fillStyle = i % 2 === 0 ? "#1a1a1a" : "#111";
            ctx.fillRect(i*LANE_WIDTH, 0, LANE_WIDTH, 920);
        }

        // 판정선 (네온 그린)
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(0, 780, canvas.width, 10);

        // 노트 렌더링
        notes.forEach(note => {
            if (note.hit) return;
            const y = 780 - (note.time - currentTime) * 0.75;
            if (y > -100 && y < 920) drawNote(note, y);
        });

        drawCharacter();
        requestAnimationFrame(draw);
    }

    function controlAudio() { audio.paused ? audio.play() : audio.pause(); }
    function toggleMode() { /* 추후 에디터 전환 기능 */ }

    draw();
    // 1. 키보드 입력 감지 (S, D, F 키 사용 예시)
window.addEventListener('keydown', (e) => {
    let lane = 0;
    if (e.key === 's' || e.key === 'S') lane = 1;
    if (e.key === 'd' || e.key === 'D') lane = 2;
    if (e.key === 'f' || e.key === 'F') lane = 3;

    if (lane > 0) checkHit(lane);
});

// 2. 판정 로직
function checkHit(lane) {
    const currentTime = audio.currentTime * 1000;
    const judgeLineY = 780; // 판정선 위치
    
    notes.forEach(note => {
        if (note.hit || note.lane !== lane) return;
        
        // 노트의 현재 Y축 위치 계산
        const noteY = judgeLineY - (note.time - currentTime) * 0.75;
        
        // 판정 범위 (판정선 기준 +- 50px 정도면 Perfect)
        if (Math.abs(noteY - judgeLineY) < 50) {
            note.hit = true;
            if (note.type === 'REAL') {
                score += 100; // 일반 지폐는 점수 증가
                document.getElementById('judge-display').innerText = "PERFECT!";
            } else {
                life += 10; // 회장님 지폐(FAKE)를 치면 의심도 상승!
                document.getElementById('judge-display').innerText = "CAUTION!";
            }
            document.getElementById('score').innerText = score;
            document.getElementById('life').innerText = life;
        }
    });
